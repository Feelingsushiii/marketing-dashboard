<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webinar Dashboard — LegalVision</title>
<style>
:root{
  --bg:#f5f5f2;--panel:#fff;--muted:#6c6f73;--text:#1b1d1f;--line:#e5e4df;
  --soft:#f1f0ec;--green:#1D9E75;--purple:#534AB7;--blue:#185FA5;--olive:#3B6D11;
  --orange:#BA7517;--burnt:#993C1D;--teal:#0F6E56;--danger:#b83b3b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}

/* ── Sidebar ── */
.sidebar{background:#fbfbf9;border-right:1px solid var(--line);padding:20px 14px;display:flex;flex-direction:column;gap:12px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand h1{font-size:18px;font-weight:700;margin-bottom:2px}
.brand p{font-size:12px;color:var(--muted)}
.toolbar{display:flex;gap:6px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 12px;font:inherit;font-size:13px;cursor:pointer;color:var(--text);transition:background 0.1s}
.btn:hover{background:var(--soft)}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{filter:brightness(0.95)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.search{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;font:inherit;font-size:13px;outline:none}
.search:focus{border-color:#b0aee0}
.webinar-list{display:flex;flex-direction:column;gap:7px;overflow-y:auto}
.wcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color 0.15s}
.wcard:hover{border-color:#c0bde8}
.wcard.active{border-color:var(--purple);box-shadow:0 0 0 2px rgba(83,74,183,.07)}
.wcard-name{font-size:14px;font-weight:600;margin-bottom:5px;line-height:1.3}
.wcard-meta{font-size:12px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.wpill{font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;background:#f0eefe;color:var(--purple)}
.wpill.green{background:#e5f6f1;color:var(--teal)}
.wcard-bar{height:4px;background:#eceae5;border-radius:99px;overflow:hidden;margin-top:8px}
.wcard-fill{height:100%;background:var(--green);border-radius:99px;transition:width 0.3s}

/* ── Main ── */
.main{padding:28px 32px;min-width:0;overflow-y:auto}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--muted);gap:12px;text-align:center}
.empty-state h2{font-size:18px;font-weight:600;color:var(--text)}
.empty-state p{font-size:14px;max-width:320px;line-height:1.6}

/* ── Hero ── */
.hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.hero-left h2{font-size:26px;font-weight:700;margin-bottom:4px;line-height:1.2}
.hero-left p{font-size:13px;color:var(--muted)}
.hero-actions{display:flex;gap:7px;flex-wrap:wrap;flex-shrink:0}

/* ── Info grid ── */
.info-grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:14px;margin-bottom:18px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
.panel-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);margin-bottom:12px}
.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kv-item{padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fcfcfa}
.kv-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:3px}
.kv-val{font-size:14px;font-weight:500}
.overall-bar{margin-top:12px}
.bar{height:8px;background:#eceae5;border-radius:99px;overflow:hidden}
.fill{height:100%;background:var(--green);border-radius:99px;transition:width 0.3s}
.bar-label{font-size:12px;color:var(--muted);margin-top:5px}
.next-task-box{background:#f7f6ff;border:1px solid #e2deff;border-radius:10px;padding:14px;margin-top:2px}
.nt-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--purple);margin-bottom:6px}
.nt-task{font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.4}
.nt-meta{font-size:12px;color:var(--muted)}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px}
.tab{padding:9px 16px;border:none;background:transparent;font:inherit;font-size:13px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.1s}
.tab.active{color:var(--purple);font-weight:600;border-bottom-color:var(--purple)}
.tab:hover:not(.active){color:var(--text)}
.tabpanel{display:none}
.tabpanel.active{display:block}

/* ── Controls ── */
.controls{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}

/* ── Phase + tasks ── */
.phase{margin-bottom:10px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.phase-header{padding:12px 16px;background:#f7f6f3;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.phase-header:hover{background:#f0efea}
.phase-left{display:flex;gap:10px;align-items:center}
.phase-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.phase-name{font-size:14px;font-weight:600}
.phase-timing{font-size:12px;color:var(--muted);margin-top:2px}
.phase-right{font-size:12px;color:var(--muted);display:flex;gap:10px;align-items:center}
.chev{transition:transform 0.2s;font-size:11px;color:#bbb}
.chev.open{transform:rotate(180deg)}
.phase-body{display:none;border-top:1px solid var(--line)}
.phase-body.open{display:block}
.section-hdr{padding:7px 16px;background:#fbfbf9;font-size:11px;font-weight:700;letter-spacing:0.4px;color:#8b8f92;text-transform:uppercase;border-bottom:1px solid #f2f1ec}
.task-row{display:grid;grid-template-columns:18px 1fr auto;gap:10px;align-items:start;padding:10px 16px;border-top:1px solid #f2f1ec;cursor:pointer}
.task-row:hover{background:#fafaf8}
.task-row:first-child{border-top:none}
.task-row input[type=checkbox]{margin-top:2px;width:15px;height:15px;accent-color:var(--green);cursor:pointer}
.task-text{font-size:14px;line-height:1.4}
.task-text.done{color:#b4b6b9;text-decoration:line-through}
.task-detail{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4}
.task-detail.done{color:#ccc}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:0.2px}
.tag-au{background:#E1F5EE;color:#0F6E56}
.tag-uk{background:#E6F1FB;color:#185FA5}
.tag-nz{background:#FAEEDA;color:#854F0B}
.tag-note{background:#f4f4f1;color:#777;border:1px solid var(--line)}
.tag-high{background:#FCEBEB;color:#A32D2D}
.tag-med{background:#FAEEDA;color:#854F0B}
.tag-low{background:#EAF3DE;color:#3B6D11}
.task-num{font-size:11px;color:#ccc;margin-top:2px}

/* ── Progress cards ── */
.stage-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.stage-card{padding:12px;border:1px solid var(--line);border-radius:10px;background:#fff}
.stage-card h4{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text)}

/* ── Notes ── */
.notes-area{width:100%;min-height:200px;padding:14px;border:1px solid var(--line);border-radius:12px;font:inherit;font-size:14px;background:#fff;resize:vertical;outline:none;color:var(--text)}
.notes-area:focus{border-color:#b0aee0}

/* ── Modal ── */
dialog{border:none;border-radius:16px;padding:0;max-width:520px;width:calc(100vw - 32px);box-shadow:0 8px 40px rgba(0,0,0,0.15)}
dialog::backdrop{background:rgba(0,0,0,0.25)}
.modal-inner{padding:22px}
.modal-inner h3{font-size:17px;font-weight:700;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .full{grid-column:1/-1}
.field-label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:5px}
.field-input{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;font:inherit;font-size:13px;outline:none;color:var(--text)}
.field-input:focus{border-color:#b0aee0}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}

/* Reminder modal */
.reminder-modal{border:none;border-radius:16px;padding:0;max-width:400px;width:calc(100vw - 32px);box-shadow:0 8px 40px rgba(0,0,0,0.15)}
.reminder-modal::backdrop{background:rgba(0,0,0,0.25)}
.rm-status{font-size:12px;color:var(--green);margin-top:10px;min-height:16px;text-align:center}

/* Responsive */
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--line);height:auto;position:static}.info-grid{grid-template-columns:1fr}.main{padding:18px}}
</style>
</head>
<body>
<div class="app">

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="brand">
    <h1>Webinar dashboard</h1>
    <p>One entry per webinar — ops + slides in one place</p>
  </div>
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openCreate()">+ New webinar</button>
    <button class="btn btn-sm" onclick="exportData()" title="Export backup">Export</button>
    <button class="btn btn-sm" onclick="document.getElementById('imp').click()" title="Import backup">Import</button>
    <input id="imp" type="file" accept="application/json" style="display:none" onchange="importData(event)">
  </div>
  <input class="search" id="search" placeholder="Search webinars…" oninput="renderSidebar()">
  <div class="webinar-list" id="webinarList"></div>
  <div style="margin-top:auto;padding-top:12px;border-top:1px solid var(--line)">
    <button class="btn btn-sm" style="width:100%" onclick="window.history.back()">← Back</button>
  </div>
</aside>

<!-- ── MAIN ── -->
<main class="main" id="main"></main>
</div>

<!-- ── NEW / EDIT WEBINAR MODAL ── -->
<dialog id="webinarModal">
  <div class="modal-inner">
    <h3 id="modalTitle">New webinar</h3>
    <div class="form-grid">
      <div class="full"><label class="field-label">Webinar name</label><input class="field-input" id="fName" placeholder="e.g. Avoiding Costly Payroll Mistakes in Your Australian Business"></div>
      <div><label class="field-label">Date</label><input class="field-input" id="fDate" type="date"></div>
      <div><label class="field-label">Region</label><select class="field-input" id="fRegion"><option value="AU">AU</option><option value="UK">UK</option><option value="NZ">NZ</option></select></div>
      <div><label class="field-label">Status</label><select class="field-input" id="fStatus"><option>Planning</option><option>Marketing</option><option>Pre-Event</option><option>Live</option><option>Post-Event</option><option>Completed</option></select></div>
      <div><label class="field-label">Speaker(s)</label><input class="field-input" id="fSpeaker" placeholder="e.g. James True, Yin Chiew"></div>
      <div><label class="field-label">Owner</label><input class="field-input" id="fOwner" value="Sambridi"></div>
      <div class="full"><label class="field-label">Notes</label><textarea class="field-input" id="fNotes" style="min-height:80px;resize:vertical"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeWebinarModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveWebinar()">Save webinar</button>
    </div>
  </div>
</dialog>

<!-- ── REMINDER MODAL ── -->
<dialog class="reminder-modal" id="reminderModal">
  <div class="modal-inner">
    <h3>Set a calendar reminder</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5">Creates a Google Calendar event with a pop-up notification. You'll be asked to sign in with Google the first time.</p>
    <div style="margin-bottom:12px">
      <label class="field-label">Webinar</label>
      <input class="field-input" id="rm-task" readonly style="background:#f9f9f7;color:#666">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div><label class="field-label">Date</label><input class="field-input" id="rm-date" type="date"></div>
      <div><label class="field-label">Time</label><input class="field-input" id="rm-time" type="time" value="09:00"></div>
    </div>
    <div style="margin-bottom:16px">
      <label class="field-label">Note (optional)</label>
      <input class="field-input" id="rm-note" placeholder="e.g. Confirm speakers before this date">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeReminderModal()">Cancel</button>
      <button class="btn btn-primary" id="rm-save" onclick="createReminder()">Connect Google Calendar</button>
    </div>
    <div class="rm-status" id="rm-status"></div>
  </div>
</dialog>

<!-- Google API scripts — only load when reminder is triggered -->
<script>
// ═══════════ CALENDAR REMINDERS (Google OAuth — works on GitHub Pages) ═══════════
// How it works:
// 1. User clicks ⏰ Reminder
// 2. On first use, Google OAuth popup signs them in (scope: calendar.events)
// 3. We call the Google Calendar REST API directly with their access token
// 4. No backend needed — fully client-side

const GCAL_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID'; // Replace with your OAuth client ID from console.cloud.google.com
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.events';

let gcalToken = null;
let pendingReminderTask = null;
let tokenClient = null;

function loadGoogleIdentity(callback){
  if(window.google?.accounts?.oauth2){callback();return;}
  const s=document.createElement('script');
  s.src='https://accounts.google.com/gsi/client';
  s.onload=callback;
  document.head.appendChild(s);
}

function initTokenClient(callback){
  if(GCAL_CLIENT_ID==='YOUR_GOOGLE_CLIENT_ID'){
    document.getElementById('rm-status').textContent='⚠️ Add your Google OAuth Client ID to enable calendar reminders. See the README for setup instructions.';
    document.getElementById('rm-save').disabled=false;
    document.getElementById('rm-save').textContent='Create reminder';
    return;
  }
  loadGoogleIdentity(()=>{
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:GCAL_CLIENT_ID,
      scope:GCAL_SCOPE,
      callback:(resp)=>{
        if(resp.error){
          document.getElementById('rm-status').textContent='Could not sign in to Google. Please try again.';
          document.getElementById('rm-save').disabled=false;
          document.getElementById('rm-save').textContent='Try again';
          return;
        }
        gcalToken=resp.access_token;
        doCreateCalendarEvent();
      }
    });
    callback&&callback();
  });
}

function setReminder(taskName,date){
  pendingReminderTask={name:taskName};
  document.getElementById('rm-task').value=taskName;
  document.getElementById('rm-date').value=date||new Date().toISOString().split('T')[0];
  document.getElementById('rm-time').value='09:00';
  document.getElementById('rm-note').value='';
  document.getElementById('rm-status').textContent='';
  document.getElementById('rm-save').disabled=false;
  document.getElementById('rm-save').textContent=gcalToken?'Create reminder':'Connect Google Calendar';
  document.getElementById('reminderModal').showModal();
}

function closeReminderModal(){document.getElementById('reminderModal').close();}

function createReminder(){
  const date=document.getElementById('rm-date').value;
  const time=document.getElementById('rm-time').value;
  if(!date||!time){document.getElementById('rm-status').textContent='Please set a date and time.';return;}
  const btn=document.getElementById('rm-save');
  btn.disabled=true;btn.textContent='Connecting…';
  document.getElementById('rm-status').textContent='';
  if(gcalToken){doCreateCalendarEvent();}
  else{initTokenClient(()=>{tokenClient.requestAccessToken({prompt:'consent'});});}
}

async function doCreateCalendarEvent(){
  const btn=document.getElementById('rm-save');
  btn.textContent='Creating…';
  const date=document.getElementById('rm-date').value;
  const time=document.getElementById('rm-time').value;
  const note=document.getElementById('rm-note').value.trim();
  const w=activeW();
  const [h,m]=time.split(':').map(Number);
  const endH=String(h+(m+30>=60?1:0)).padStart(2,'0'),endM=String((m+30)%60).padStart(2,'0');
  const event={
    summary:`⏰ ${pendingReminderTask.name}`,
    description:`Webinar: ${w?.name||''}\nRegion: ${w?.region||''}\nStatus: ${w?.status||''}\nSpeaker: ${w?.speaker||''}${note?'\n\nNote: '+note:''}`,
    start:{dateTime:`${date}T${time}:00`,timeZone:'Australia/Sydney'},
    end:{dateTime:`${date}T${endH}:${endM}:00`,timeZone:'Australia/Sydney'},
    reminders:{useDefault:false,overrides:[{method:'popup',minutes:10},{method:'popup',minutes:0}]}
  };
  try{
    const res=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',
      headers:{'Authorization':'Bearer '+gcalToken,'Content-Type':'application/json'},
      body:JSON.stringify(event)
    });
    if(res.status===401){gcalToken=null;tokenClient.requestAccessToken({prompt:''});return;}
    if(!res.ok)throw new Error(await res.text());
    const data=await res.json();
    btn.textContent='✓ Reminder created';
    btn.style.background='var(--green)';btn.style.borderColor='var(--green)';
    document.getElementById('rm-status').innerHTML=`Saved to Google Calendar. <a href="${data.htmlLink}" target="_blank" style="color:var(--blue)">View event →</a>`;
    setTimeout(closeReminderModal,2800);
  }catch(e){
    btn.disabled=false;btn.textContent='Try again';btn.style.background='';btn.style.borderColor='';
    document.getElementById('rm-status').textContent='Could not create event. Please try again.';
    console.error(e);
  }
}
</script>

<script>
// ═══════════ DATA ═══════════
const SK='lv_webinar_dash_v1', SS='lv_webinar_state_v1';
const load=(k,fb)=>{try{return JSON.parse(localStorage.getItem(k))??fb;}catch{return fb;}};

let webinars=load(SK,[{id:crypto.randomUUID(),name:'7 Legal Mistakes Webinar',date:'2026-04-14',status:'Marketing',region:'AU',speaker:'Ruben + Michaela',owner:'Sambridi',notes:'Sample webinar.'}]);
let wState=load(SS,{});
let activeId=webinars[0]?.id||null;
let editingId=null;

function persist(){localStorage.setItem(SK,JSON.stringify(webinars));localStorage.setItem(SS,JSON.stringify(wState));syncProgress();}
function getState(id){if(!wState[id])wState[id]={checks:{},phaseOpen:{},slideOpen:{},hrc:{},notes:''};return wState[id];}
function activeW(){return webinars.find(w=>w.id===activeId);}
function esc(s=''){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function fmtDate(d){if(!d)return'—';const x=new Date(d+'T00:00');return x.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});}
function regionAllows(task,region){return!task.jur||task.jur.toUpperCase()===region.toUpperCase();}

// Sync overall progress to shared localStorage for tracker sidebar
function syncProgress(){
  const allChecks={};
  webinars.forEach(w=>{
    const st=getState(w.id).checks;
    opsPhases.forEach(ph=>ph.sections.forEach(s=>s.tasks.forEach(t=>{
      if(regionAllows(t,w.region)){const k=`ops|${ph.id}|${s.name}|${t.t}`;allChecks[k]=!!st[k];}
    })));
    slidePhases.forEach(ph=>ph.tasks.forEach(t=>{const k=`slides|${ph.id}|${t.n}`;allChecks[k]=!!st[k];}));
  });
  localStorage.setItem('lv_ops_checklist',JSON.stringify(allChecks));
  localStorage.setItem('lv_slides_checklist',JSON.stringify(allChecks));
}

// ═══════════ COUNT HELPERS ═══════════
function countOps(id){
  const s=getState(id).checks,w=webinars.find(x=>x.id===id);
  let total=0,done=0;
  opsPhases.forEach(ph=>ph.sections.forEach(sec=>sec.tasks.forEach(task=>{if(regionAllows(task,w.region)){total++;if(s[`ops|${ph.id}|${sec.name}|${task.t}`])done++;}})));
  return{total,done,pct:total?Math.round(done/total*100):0};
}
function countSlides(id){
  const s=getState(id).checks;let total=0,done=0;
  slidePhases.forEach(ph=>ph.tasks.forEach(t=>{total++;if(s[`slides|${ph.id}|${t.n}`])done++;}));
  return{total,done,pct:total?Math.round(done/total*100):0};
}
function countAll(id){const a=countOps(id),b=countSlides(id);return{total:a.total+b.total,done:a.done+b.done,pct:(a.total+b.total)?Math.round((a.done+b.done)/(a.total+b.total)*100):0};}
function nextTask(id){
  const st=getState(id).checks,w=webinars.find(x=>x.id===id);
  for(const ph of opsPhases)for(const s of ph.sections)for(const t of s.tasks)
    if(regionAllows(t,w.region)&&!st[`ops|${ph.id}|${s.name}|${t.t}`])return{label:'Operations',phase:ph.name,task:t.t};
  for(const ph of slidePhases)for(const t of ph.tasks)
    if(!st[`slides|${ph.id}|${t.n}`])return{label:'Slides',phase:ph.name,task:t.t};
  return{label:'Complete',phase:'All done',task:'Everything is checked off for this webinar'};
}

// ═══════════ SIDEBAR ═══════════
function renderSidebar(){
  const q=document.getElementById('search').value.toLowerCase();
  const list=document.getElementById('webinarList');
  list.innerHTML='';
  const items=[...webinars].filter(w=>!q||`${w.name} ${w.speaker} ${w.status} ${w.region}`.toLowerCase().includes(q)).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(!items.length){list.innerHTML='<div style="font-size:13px;color:var(--muted);text-align:center;padding:16px">No webinars found</div>';return;}
  items.forEach(w=>{
    const c=countAll(w.id);
    const div=document.createElement('div');
    div.className='wcard'+(w.id===activeId?' active':'');
    div.onclick=()=>{activeId=w.id;renderSidebar();renderMain();};
    div.innerHTML=`
      <div class="wcard-name">${esc(w.name)}</div>
      <div class="wcard-meta">
        <span>${fmtDate(w.date)}</span>
        <span>${esc(w.region)}</span>

      </div>
      <div class="wcard-bar"><div class="wcard-fill" style="width:${c.pct}%"></div></div>`;
    list.appendChild(div);
  });
}

// ═══════════ OPS RENDER ═══════════
function renderOps(w){
  const st=getState(w.id);
  return opsPhases.map(ph=>{
    const vis=ph.sections.flatMap(s=>s.tasks.filter(t=>regionAllows(t,w.region)).map(t=>({s,t})));
    const total=vis.length,done=vis.filter(x=>st.checks[`ops|${ph.id}|${x.s.name}|${x.t.t}`]).length;
    const open=!!st.phaseOpen[ph.id];
    return `<div class="phase">
      <div class="phase-header" onclick="togglePhase('ops','${ph.id}')">
        <div class="phase-left"><div class="phase-dot" style="background:${ph.color}"></div><div><div class="phase-name">${esc(ph.name)}</div><div class="phase-timing">${esc(ph.timing)}</div></div></div>
        <div class="phase-right"><span>${done}/${total} · ${total?Math.round(done/total*100):0}%</span><span class="chev ${open?'open':''}" id="cop-${ph.id}">▼</span></div>
      </div>
      <div class="phase-body ${open?'open':''}" id="bop-${ph.id}">
        ${ph.sections.map(s=>{
          const tasks=s.tasks.filter(t=>regionAllows(t,w.region));
          if(!tasks.length)return'';
          return `<div><div class="section-hdr">${esc(s.name)}</div>${tasks.map(t=>{
            const key=`ops|${ph.id}|${s.name}|${t.t}`,checked=!!st.checks[key];
            return `<div class="task-row" onclick="toggle('${key}')">
              <input type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation();toggle('${key}')">
              <div><div class="task-text ${checked?'done':''}">${esc(t.t)}</div>
              <div class="tags">${t.jur?`<span class="tag tag-${t.jur.toLowerCase()}">${t.jur.toUpperCase()} only</span>`:''}${t.note?`<span class="tag tag-note" title="${esc(t.note)}">note</span>`:''}</div>
              </div><div></div></div>`;
          }).join('')}</div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

// ═══════════ SLIDES RENDER ═══════════
function rc(r){return r==='High'?'tag-high':r==='Medium'?'tag-med':'tag-low';}
function rl(r){return r==='High'?'HIGH':r==='Medium'?'MED':'LOW';}
function renderSlides(w){
  const st=getState(w.id);
  return slidePhases.map(ph=>{
    const total=ph.tasks.length,done=ph.tasks.filter(t=>st.checks[`slides|${ph.id}|${t.n}`]).length;
    const open=!!st.slideOpen[ph.id];
    return `<div class="phase">
      <div class="phase-header" onclick="togglePhase('slides','${ph.id}')">
        <div class="phase-left"><div class="phase-dot" style="background:${ph.color}"></div><div class="phase-name">${esc(ph.name)}</div></div>
        <div class="phase-right"><span>${done}/${total} · ${Math.round(done/total*100)}%</span><span class="chev ${open?'open':''}" id="csl-${ph.id}">▼</span></div>
      </div>
      <div class="phase-body ${open?'open':''}" id="bsl-${ph.id}">
        ${ph.tasks.map(t=>{
          const key=`slides|${ph.id}|${t.n}`,checked=!!st.checks[key];
          return `<div class="task-row" onclick="toggle('${key}')">
            <input type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation();toggle('${key}')">
            <div><div class="task-text ${checked?'done':''}">${esc(t.t)}</div>
            <div class="task-detail ${checked?'done':''}">${esc(t.d)}</div>
            <div class="tags"><span class="tag ${rc(t.r)}">${rl(t.r)}</span></div></div>
            <div class="task-num">#${t.n}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderProgressCards(w){
  const st=getState(w.id).checks;
  const cards=[...opsPhases.map(ph=>{
    const keys=[];ph.sections.forEach(s=>s.tasks.forEach(t=>{if(regionAllows(t,w.region))keys.push(`ops|${ph.id}|${s.name}|${t.t}`);}));
    const done=keys.filter(k=>st[k]).length,total=keys.length,pct=total?Math.round(done/total*100):0;
    return`<div class="stage-card"><h4>${esc(ph.name)}</h4><div class="bar"><div class="fill" style="width:${pct}%;background:${ph.color}"></div></div><div style="font-size:12px;color:var(--muted);margin-top:4px">${done}/${total} · ${pct}%</div></div>`;
  }),...slidePhases.map(ph=>{
    const keys=ph.tasks.map(t=>`slides|${ph.id}|${t.n}`);
    const done=keys.filter(k=>st[k]).length,total=keys.length,pct=Math.round(done/total*100);
    return`<div class="stage-card"><h4>Slides: ${esc(ph.name)}</h4><div class="bar"><div class="fill" style="width:${pct}%;background:${ph.color}"></div></div><div style="font-size:12px;color:var(--muted);margin-top:4px">${done}/${total} · ${pct}%</div></div>`;
  })];
  return cards.join('');
}

function renderHRC(w){
  const st=getState(w.id);
  return highRiskChecks.map((item,i)=>{
    const key=`hrc|${i}`,checked=!!st.hrc[key];
    return`<div class="task-row" onclick="toggleHRC('${key}')">
      <input type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation();toggleHRC('${key}')">
      <div><div class="task-text ${checked?'done':''}">${esc(item.c)}</div><div class="task-detail">${esc(item.w)}</div></div>
      <div></div></div>`;
  }).join('');
}

// ═══════════ INTERACTIONS ═══════════
function toggle(key){const st=getState(activeId);st.checks[key]=!st.checks[key];persist();renderSidebar();renderMain();}
function toggleHRC(key){const st=getState(activeId);st.hrc[key]=!st.hrc[key];persist();renderMain();}
function togglePhase(stream,id){
  const st=getState(activeId);
  const b=stream==='ops'?st.phaseOpen:st.slideOpen;
  b[id]=!b[id];persist();renderMain();
}
function expandAll(s){const st=getState(activeId);(s==='ops'?opsPhases:slidePhases).forEach(ph=>(s==='ops'?st.phaseOpen:st.slideOpen)[ph.id]=true);persist();renderMain();}
function collapseAll(s){const st=getState(activeId);(s==='ops'?opsPhases:slidePhases).forEach(ph=>(s==='ops'?st.phaseOpen:st.slideOpen)[ph.id]=false);persist();renderMain();}
function resetStream(s){if(!confirm(`Reset ${s} checklist for this webinar?`))return;const st=getState(activeId);Object.keys(st.checks).forEach(k=>{if(k.startsWith(s==='ops'?'ops|':'slides|'))st.checks[k]=false;});if(s==='slides')Object.keys(st.hrc).forEach(k=>st.hrc[k]=false);persist();renderSidebar();renderMain();}
function saveNotes(v){const st=getState(activeId);st.notes=v;persist();}
function showTab(name,el){document.querySelectorAll('.tabpanel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+name).classList.add('active');el.classList.add('active');}

// ═══════════ WEBINAR CRUD ═══════════
function openCreate(){editingId=null;document.getElementById('modalTitle').textContent='New webinar';['fName','fSpeaker','fNotes'].forEach(id=>document.getElementById(id).value='');document.getElementById('fDate').value='';document.getElementById('fStatus').value='Planning';document.getElementById('fRegion').value='AU';document.getElementById('fOwner').value='Sambridi';document.getElementById('webinarModal').showModal();}
function openEdit(){const w=activeW();if(!w)return;editingId=w.id;document.getElementById('modalTitle').textContent='Edit webinar';document.getElementById('fName').value=w.name||'';document.getElementById('fDate').value=w.date||'';document.getElementById('fStatus').value=w.status||'Planning';document.getElementById('fRegion').value=w.region||'AU';document.getElementById('fSpeaker').value=w.speaker||'';document.getElementById('fOwner').value=w.owner||'Sambridi';document.getElementById('fNotes').value=w.notes||'';document.getElementById('webinarModal').showModal();}
function closeWebinarModal(){document.getElementById('webinarModal').close();}
function saveWebinar(){
  const name=document.getElementById('fName').value.trim();if(!name){alert('Add a webinar name.');return;}
  const payload={name,date:document.getElementById('fDate').value,status:document.getElementById('fStatus').value,region:document.getElementById('fRegion').value,speaker:document.getElementById('fSpeaker').value.trim(),owner:document.getElementById('fOwner').value.trim(),notes:document.getElementById('fNotes').value.trim()};
  if(editingId){const i=webinars.findIndex(w=>w.id===editingId);webinars[i]={...webinars[i],...payload};}
  else{const item={id:crypto.randomUUID(),...payload};webinars.push(item);activeId=item.id;}
  persist();closeWebinarModal();renderSidebar();renderMain();
}
function duplicateW(){const w=activeW();if(!w)return;const copy={...w,id:crypto.randomUUID(),name:w.name+' (Copy)',status:'Planning'};webinars.push(copy);wState[copy.id]=JSON.parse(JSON.stringify(getState(w.id)));activeId=copy.id;persist();renderSidebar();renderMain();}
function deleteW(){const w=activeW();if(!w)return;if(!confirm(`Delete "${w.name}"?`))return;webinars=webinars.filter(x=>x.id!==w.id);delete wState[w.id];activeId=webinars[0]?.id||null;persist();renderSidebar();renderMain();}

// ═══════════ EXPORT / IMPORT ═══════════
function exportData(){const blob=new Blob([JSON.stringify({webinars,wState},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='webinar-dashboard-backup.json';a.click();URL.revokeObjectURL(a.href);}
function importData(e){const file=e.target.files?.[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.webinars)throw new Error();webinars=d.webinars;wState=d.wState||{};activeId=webinars[0]?.id||null;persist();renderSidebar();renderMain();}catch{alert('Could not import that file.');}finally{e.target.value='';}};r.readAsText(file);}

// Check if tracker sent a specific webinar to open
(function(){
  try{
    const raw=localStorage.getItem('lv_active_webinar');
    if(raw){
      const{id,ts}=JSON.parse(raw);
      // Only honour if signal is fresh (within 10 seconds)
      if(id&&Date.now()-ts<10000){
        const found=webinars.find(w=>w.id===id);
        if(found)activeId=found.id;
      }
      localStorage.removeItem('lv_active_webinar');
    }
  }catch(e){}
})();
