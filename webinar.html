<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webinar Dashboard — LegalVision</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:#f5f5f2;
margin:0;
color:#1b1d1f;
}

.sidebar{
width:300px;
background:white;
border-right:1px solid #e5e4df;
padding:20px;
height:100vh;
position:fixed;
overflow:auto;
}

.main{
margin-left:300px;
padding:40px;
}

button{
background:#534AB7;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

button.secondary{
background:#f1f0ec;
color:#333;
}

.webinar-card{
background:white;
padding:14px;
border-radius:10px;
border:1px solid #e5e4df;
margin-bottom:10px;
cursor:pointer;
}

.webinar-card:hover{
border-color:#534AB7;
}

.progress{
height:6px;
background:#eee;
border-radius:20px;
overflow:hidden;
margin-top:6px;
}

.progress-fill{
height:100%;
background:#1D9E75;
}

.hero h1{
margin:0 0 6px 0;
}

.phase{
background:white;
border:1px solid #e5e4df;
border-radius:12px;
margin-bottom:10px;
}

.phase-header{
padding:12px;
cursor:pointer;
background:#f7f6f3;
}

.task{
padding:10px 16px;
border-top:1px solid #eee;
display:flex;
gap:8px;
align-items:flex-start;
}

.task input{
margin-top:4px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Webinar Dashboard</h2>

<button onclick="createWebinar()">+ New Webinar</button>

<br><br>

<div id="webinarList"></div>

<br>

<button class="secondary" onclick="window.open('index.html','_blank')">
← Back to Task Tracker
</button>

</div>

<div class="main" id="main"></div>

<script>

const STORAGE_KEY="lv_webinars";

let webinars=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");

let activeId=null;

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(webinars));
}

function createWebinar(){

const name=prompt("Webinar name");

if(!name)return;

const w={
id:crypto.randomUUID(),
name:name,
tasks:{}
};

webinars.push(w);

activeId=w.id;

save();

render();

}

function render(){

renderSidebar();

renderMain();

}

function renderSidebar(){

const list=document.getElementById("webinarList");

list.innerHTML="";

webinars.forEach(w=>{

const div=document.createElement("div");

div.className="webinar-card";

div.onclick=()=>{

activeId=w.id;

render();

};

const total=tasks.length;

const done=tasks.filter(t=>w.tasks[t]).length;

const pct=Math.round(done/total*100);

div.innerHTML=`

<strong>${w.name}</strong>

<div class="progress">
<div class="progress-fill" style="width:${pct}%"></div>
</div>

`;

list.appendChild(div);

});

}

const tasks=[

"Create Zoom event",

"Set event timezone",

"Add speakers",

"Configure registration",

"Set reminder emails",

"Create Marketo program",

"Create landing page",

"Generate UTMs",

"Create slides",

"Create QR code",

"Prepare talking points",

"Practice run",

"Host webinar",

"Upload recording",

"Publish YouTube video"

];

function renderMain(){

const main=document.getElementById("main");

const w=webinars.find(x=>x.id===activeId);

if(!w){

main.innerHTML="<h2>Select a webinar</h2>";

return;

}

let html=`<div class="hero">

<h1>${w.name}</h1>

</div>`;

tasks.forEach(task=>{

const checked=w.tasks[task]===true;

html+=`

<div class="task">

<input type="checkbox"

${checked?"checked":""}

onclick="toggleTask('${task}')">

<div>${task}</div>

</div>

`;

});

main.innerHTML=html;

}

function toggleTask(task){

const w=webinars.find(x=>x.id===activeId);

w.tasks[task]=!w.tasks[task];

save();

render();

}

render();

</script>

</body>
</html>
